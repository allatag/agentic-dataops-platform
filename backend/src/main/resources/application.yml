spring:
  application:
    name: agentic-dataops-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/dataops
    username: dataops
    password: dataops
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: raw-event-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.dataops.backend.ingestion
        spring.json.value.default.type: com.dataops.backend.ingestion.RawEvent

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} correlationId=%X{correlationId:-} tenantId=%X{tenantId:-} eventId=%X{eventId:-} source=%X{source:-} eventType=%X{eventType:-} - %msg%n"

app:
  kafka:
    topic:
      raw-events: raw-events.v1
